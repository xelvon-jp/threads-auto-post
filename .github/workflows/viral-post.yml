name: Threads バズ投稿

on:
  schedule:
    # 3時間おきに起動（JST 0,3,6,9,12,15,18,21時 ≒ UTC 15,18,21,0,3,6,9,12時）
    # スクリプト内で25%確率 + 最大15分ランダム待機により不規則に投稿
    - cron: '17 0,3,6,9,12,15,18,21 * * *'
  workflow_dispatch: # 手動実行ボタン

permissions:
  contents: write

jobs:
  viral_post:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: バズ投稿スクリプトを実行
        env:
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          NOTE_USERNAME: xelvon
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python post_to_threads.py --viral

      - name: 投稿履歴をコミット
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add post_history.json
          git diff --staged --quiet || git commit -m "chore: update post history (viral) [skip ci]"
          git push
